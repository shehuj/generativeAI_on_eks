---
apiVersion: v1
kind: Namespace
metadata:
  name: dogbooth
---
apiVersion: ray.io/v1
kind: RayService
metadata:
  name: dogbooth
  namespace: dogbooth
spec:
  # Serve config in the v2 (multi-application) format required by KubeRay >= 1.0.
  serveConfigV2: |
    applications:
      - name: dogbooth
        import_path: dogbooth:entrypoint
        route_prefix: /
        runtime_env:
          env_vars:
            MODEL_ID: "askulkarni2/dogbooth"
            # MODEL_ID: "stabilityai/stable-diffusion-2-1"
  rayClusterConfig:
    rayVersion: '2.6.0'
    headGroupSpec:
      rayStartParams:
        dashboard-host: '0.0.0.0'
      template:
        spec:
          containers:
            - name: ray-head
              image: public.ecr.aws/h3o5n2r0/dogbooth:0.0.1-gpu
              resources:
                limits:
                  cpu: 2
                  memory: 16Gi
                  nvidia.com/gpu: 1
                requests:
                  cpu: 2
                  memory: 16Gi
                  nvidia.com/gpu: 1
              ports:
                - containerPort: 6379
                  name: gcs-server
                  protocol: TCP
                - containerPort: 8265
                  name: dashboard
                  protocol: TCP
                - containerPort: 10001
                  name: client
                  protocol: TCP
                - containerPort: 8000
                  name: serve
                  protocol: TCP
    workerGroupSpecs:
      - replicas: 1
        minReplicas: 1
        maxReplicas: 5
        rayStartParams: {}
        groupName: small-group
        template:
          spec:
            containers:
              - name: ray-worker
                image: public.ecr.aws/h3o5n2r0/dogbooth:0.0.1-gpu
                lifecycle:
                  preStop:
                    exec:
                      command: ["/bin/sh","-c","ray stop"]
                resources:
                  limits:
                    cpu: "2"
                    memory: "16Gi"
                    nvidia.com/gpu: 1
                  requests:
                    cpu: "2"
                    memory: "16Gi"
                    nvidia.com/gpu: 1
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dogbooth
  namespace: dogbooth
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: "/$1"
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
        # Ray Dashboard
        - path: /dogbooth/(.*)
          pathType: ImplementationSpecific
          backend:
            service:
              name: dogbooth-head-svc
              port:
                number: 8265
        # Ray Serve
        - path: /dogbooth/serve/(.*)
          pathType: ImplementationSpecific
          backend:
            service:
              name: dogbooth-head-svc
              port:
                number: 8000
