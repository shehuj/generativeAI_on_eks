---
apiVersion: v1
kind: Namespace
metadata:
  name: dogbooth-app
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: streamlit-deployment
  namespace: dogbooth-app
  labels:
    app: streamlit
spec:
  replicas: 1
  selector:
    matchLabels:
      app: streamlit
  template:
    metadata:
      labels:
        app: streamlit
    spec:
      # Pull secret for the private Docker Hub app image. The pipeline creates
      # the `dockerhub` secret in this namespace before sync. (Harmless when the
      # upstream public image is used — kubelet falls back to anonymous pull.)
      imagePullSecrets:
        - name: dockerhub
      containers:
        - name: streamlit
          image: public.ecr.aws/h3o5n2r0/gen-ai-demo/dogbooth-app:0.0.2
          imagePullPolicy: Always
          ports:
            - containerPort: 8501
          livenessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
              scheme: HTTP
            timeoutSeconds: 1
          readinessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
              scheme: HTTP
            timeoutSeconds: 1
          resources:
            limits:
              cpu: 1
              memory: 2Gi
            requests:
              cpu: 100m
              memory: 745Mi
---
apiVersion: v1
kind: Service
metadata:
  name: streamlit-service
  namespace: dogbooth-app
spec:
  type: ClusterIP
  selector:
    app: streamlit
  ports:
    - name: streamlit-port
      protocol: TCP
      port: 8501
      targetPort: 8501
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dogbooth-app
  namespace: dogbooth-app
  annotations:
    # Internet-facing ALB, HTTPS via ACM, HTTP->HTTPS redirect. Served only on
    # claudiq.com. Health check hits the Streamlit health endpoint.
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    # No hardcoded certificate-arn: the ALB controller auto-discovers the ACM cert
    # whose domain matches the Ingress host (claudiq.com). The cert is managed in
    # Terraform (dns.tf); DNS records are managed by ExternalDNS.
    alb.ingress.kubernetes.io/healthcheck-path: /_stcore/health
    alb.ingress.kubernetes.io/group.name: dogbooth
spec:
  ingressClassName: alb
  rules:
    - host: claudiq.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: streamlit-service
                port:
                  number: 8501
    - host: www.claudiq.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: streamlit-service
                port:
                  number: 8501
