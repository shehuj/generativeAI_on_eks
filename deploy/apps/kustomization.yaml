apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Manifests synced to the cluster by Argo CD (see ai-ml/jark-stack/terraform/argocd.tf).
resources:
  - streamlit.yaml
  - ray-service.yaml

# This is the SOURCE template on main. The pipeline does NOT use it directly —
# it writes a deterministic kustomization (with the app image override) onto the
# generated `gitops` branch that Argo CD tracks. Do not merge `gitops` into main.
# The Ray service keeps its upstream public image (not built/pushed by CI).
images: []
