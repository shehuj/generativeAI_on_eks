apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Manifests synced to the cluster by Argo CD (see ai-ml/jark-stack/terraform/argocd.tf).
resources:
  - streamlit.yaml
  - ray-service.yaml

# Argo CD tracks this (on main). Pin the Streamlit app image here; bump it via a
# normal dev -> main PR to deploy a new build. The Ray service image is pinned in
# ray-service.yaml.
images:
  - name: public.ecr.aws/h3o5n2r0/gen-ai-demo/dogbooth-app
    newName: docker.io/captcloud01/dogbooth-app
    newTag: 4c696dd224497f896046cb91b8b03dc0ec7574ce
