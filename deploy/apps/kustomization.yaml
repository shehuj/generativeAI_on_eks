apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Manifests synced to the cluster by Argo CD (see ai-ml/jark-stack/terraform/argocd.tf).
resources:
  - streamlit.yaml
  - ray-service.yaml

# The CI/CD pipeline pins the Streamlit app image to the freshly built tag via:
#   kustomize edit set image \
#     public.ecr.aws/h3o5n2r0/gen-ai-demo/dogbooth-app=docker.io/<user>/dogbooth-app:<sha>
# Until the first pipeline run, the upstream public image from streamlit.yaml is used.
# The Ray service keeps its upstream public image (not built/pushed by CI).
images:
  - name: public.ecr.aws/h3o5n2r0/gen-ai-demo/dogbooth-app
    newName: docker.io/captcloud01/dogbooth-app
    newTag: 0c1b04de427a1ccea5e6d3d1d9a814ecef4cc19b
