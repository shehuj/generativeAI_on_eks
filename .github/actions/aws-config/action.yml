name: "AWS auth + load config"
description: >-
  Assume the AWS OIDC role and load a JSON config secret from AWS Secrets Manager
  into the job environment (one key per env var). Sensitive keys are masked.

inputs:
  role-arn:
    description: "IAM role ARN to assume via GitHub OIDC."
    required: true
  region:
    description: "Bootstrap AWS region (needed before the secret — which may also set AWS_REGION — is read)."
    required: true
  secret-id:
    description: "Secrets Manager secret id/ARN holding the JSON config."
    required: true

runs:
  using: composite
  steps:
    - name: Configure AWS credentials (OIDC)
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ inputs.role-arn }}
        aws-region: ${{ inputs.region }}

    - name: Load config from AWS Secrets Manager
      shell: bash
      env:
        SECRET_ID: ${{ inputs.secret-id }}
      run: |
        set -euo pipefail
        echo "Reading config from secret '${SECRET_ID}'…"
        json="$(aws secretsmanager get-secret-value --secret-id "$SECRET_ID" --query SecretString --output text)"
        # Keys whose values must be masked in the logs.
        sensitive="HUGGINGFACE_TOKEN DOCKERHUB_TOKEN"
        for key in $(echo "$json" | jq -r 'keys[]'); do
          val="$(echo "$json" | jq -r --arg k "$key" '.[$k] // empty')"
          [ -z "$val" ] && continue
          case " $sensitive " in *" $key "*) echo "::add-mask::$val" ;; esac
          printf '%s=%s\n' "$key" "$val" >> "$GITHUB_ENV"
        done
        echo "Loaded config keys: $(echo "$json" | jq -r 'keys | join(", ")')"
