name: CD

# Reusable continuous-deployment pipeline — deploys the JARK stack apps to the
# EKS cluster:
#   - src/service/ray-service.yaml  -> RayService "dogbooth" (model serving)
#   - src/app/streamlit.yaml        -> Streamlit UI + Service + Ingress
#
# Configuration (AWS_REGION, EKS_CLUSTER_NAME, DOCKERHUB_USERNAME, …) is read
# from AWS Secrets Manager at runtime. The only GitHub-side config is the OIDC
# role (secrets.AWS_ROLE_ARN); bootstrap region defaults to us-west-2.
#
# Called by deploy.yml only after BOTH infra and ci succeed. Can also be run
# manually via workflow_dispatch to roll out a specific image tag.

on:
  workflow_call:
    inputs:
      image_tag:
        description: "Image tag to deploy (defaults to the commit SHA)"
        type: string
        required: false
        default: ""
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy"
        type: string
        default: latest

permissions:
  contents: read
  id-token: write # required for AWS OIDC role assumption

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

env:
  TF_DIR: ai-ml/jark-stack/terraform
  AWS_REGION: ${{ vars.AWS_REGION || 'us-west-2' }}

jobs:
  deploy:
    name: Deploy apps to EKS
    runs-on: ubuntu-latest
    environment: production # add reviewers in Settings -> Environments for an approval gate
    steps:
      - uses: actions/checkout@v4

      - name: Preflight — OIDC role present
        env:
          AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
        run: |
          [ -z "$AWS_ROLE_ARN" ] && { echo "::error::secrets.AWS_ROLE_ARN is required"; exit 1; }
          echo "Preflight OK (region: ${AWS_REGION})"

      # Assume the role and load AWS_REGION, EKS_CLUSTER_NAME, DOCKERHUB_USERNAME,
      # etc. from Secrets Manager into the job environment.
      - name: AWS auth + load config
        uses: ./.github/actions/aws-config
        with:
          role-arn: ${{ secrets.AWS_ROLE_ARN }}
          region: ${{ env.AWS_REGION }}
          secret-id: ${{ vars.CONFIG_SECRET_ID || 'jark-stack/config' }}

      - name: Validate required config
        run: |
          [ -z "${EKS_CLUSTER_NAME:-}" ] && { echo "::error::EKS_CLUSTER_NAME missing from the config secret"; exit 1; }
          echo "Deploying to cluster '${EKS_CLUSTER_NAME}' in ${AWS_REGION}"

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name "$EKS_CLUSTER_NAME" --region "$AWS_REGION"

      - name: Resolve image overrides
        id: img
        run: |
          TAG="${{ inputs.image_tag != '' && inputs.image_tag || github.sha }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          if [ -n "${DOCKERHUB_USERNAME:-}" ]; then
            echo "app_image=docker.io/${DOCKERHUB_USERNAME}/dogbooth-app:${TAG}" >> "$GITHUB_OUTPUT"
            echo "service_image=docker.io/${DOCKERHUB_USERNAME}/dogbooth:${TAG}" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::DOCKERHUB_USERNAME not in config secret — deploying the upstream public images declared in the manifests."
            echo "app_image="     >> "$GITHUB_OUTPUT"
            echo "service_image=" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy Ray Serve model (dogbooth)
        working-directory: ${{ env.TF_DIR }}
        run: |
          set -euo pipefail
          manifest=src/service/ray-service.yaml
          if [ -n "${{ steps.img.outputs.service_image }}" ]; then
            sed -i "s#image: public.ecr.aws/[^[:space:]]*/\?dogbooth:[^[:space:]]*#image: ${{ steps.img.outputs.service_image }}#g" "$manifest"
          fi
          kubectl apply -f "$manifest"

      - name: Deploy Streamlit app
        working-directory: ${{ env.TF_DIR }}
        run: |
          set -euo pipefail
          manifest=src/app/streamlit.yaml
          if [ -n "${{ steps.img.outputs.app_image }}" ]; then
            sed -i "s#image: public.ecr.aws/[^[:space:]]*/\?dogbooth-app:[^[:space:]]*#image: ${{ steps.img.outputs.app_image }}#g" "$manifest"
          fi
          kubectl apply -f "$manifest"

      - name: Wait for rollout
        run: |
          set -euo pipefail
          kubectl -n dogbooth-app rollout status deployment/streamlit-deployment --timeout=300s
          echo "RayService status:"
          kubectl -n dogbooth get rayservice dogbooth -o wide || true

      - name: Deployment summary
        if: always()
        run: |
          {
            echo "### JARK stack deployment"
            echo ""
            echo "| App | Image |"
            echo "| --- | ----- |"
            echo "| Streamlit UI | \`${{ steps.img.outputs.app_image || 'manifest default' }}\` |"
            echo "| Ray Serve (dogbooth) | \`${{ steps.img.outputs.service_image || 'manifest default' }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
