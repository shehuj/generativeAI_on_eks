name: CD

# Reusable continuous-deployment pipeline — deploys the JARK stack apps to the
# EKS cluster:
#   - src/service/ray-service.yaml  -> RayService "dogbooth" (model serving)
#   - src/app/streamlit.yaml        -> Streamlit UI + Service + Ingress
#
# Called by deploy.yml only after BOTH infra and ci succeed. Can also be run
# manually via workflow_dispatch to roll out a specific image tag.

on:
  workflow_call:
    inputs:
      image_tag:
        description: "Image tag to deploy (defaults to the commit SHA)"
        type: string
        required: false
        default: ""
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy"
        type: string
        default: latest

permissions:
  contents: read
  id-token: write # required for AWS OIDC role assumption

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

env:
  TF_DIR: ai-ml/jark-stack/terraform

jobs:
  deploy:
    name: Deploy apps to EKS
    runs-on: ubuntu-latest
    environment: production # add reviewers in Settings -> Environments for an approval gate
    steps:
      - uses: actions/checkout@v4

      - name: Preflight — required configuration present
        env:
          AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
          AWS_REGION: ${{ vars.AWS_REGION }}
          EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME }}
        run: |
          missing=0
          [ -z "$AWS_ROLE_ARN" ]      && { echo "::error::secrets.AWS_ROLE_ARN is required"; missing=1; }
          [ -z "$AWS_REGION" ]        && { echo "::error::vars.AWS_REGION is required"; missing=1; }
          [ -z "$EKS_CLUSTER_NAME" ]  && { echo "::error::vars.EKS_CLUSTER_NAME is required"; missing=1; }
          [ "$missing" = "1" ] && exit 1
          echo "Preflight OK"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name "${{ vars.EKS_CLUSTER_NAME }}" --region "${{ vars.AWS_REGION }}"

      - name: Resolve image overrides
        id: img
        run: |
          TAG="${{ inputs.image_tag != '' && inputs.image_tag || github.sha }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          if [ -n "${{ vars.DOCKERHUB_USERNAME }}" ]; then
            echo "app_image=docker.io/${{ vars.DOCKERHUB_USERNAME }}/dogbooth-app:${TAG}" >> "$GITHUB_OUTPUT"
            echo "service_image=docker.io/${{ vars.DOCKERHUB_USERNAME }}/dogbooth:${TAG}" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::DOCKERHUB_USERNAME not set — deploying the upstream public images declared in the manifests."
            echo "app_image="     >> "$GITHUB_OUTPUT"
            echo "service_image=" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy Ray Serve model (dogbooth)
        working-directory: ${{ env.TF_DIR }}
        run: |
          set -euo pipefail
          manifest=src/service/ray-service.yaml
          if [ -n "${{ steps.img.outputs.service_image }}" ]; then
            sed -i "s#image: public.ecr.aws/[^[:space:]]*/\?dogbooth:[^[:space:]]*#image: ${{ steps.img.outputs.service_image }}#g" "$manifest"
          fi
          kubectl apply -f "$manifest"

      - name: Deploy Streamlit app
        working-directory: ${{ env.TF_DIR }}
        run: |
          set -euo pipefail
          manifest=src/app/streamlit.yaml
          if [ -n "${{ steps.img.outputs.app_image }}" ]; then
            sed -i "s#image: public.ecr.aws/[^[:space:]]*/\?dogbooth-app:[^[:space:]]*#image: ${{ steps.img.outputs.app_image }}#g" "$manifest"
          fi
          kubectl apply -f "$manifest"

      - name: Wait for rollout
        run: |
          set -euo pipefail
          kubectl -n dogbooth-app rollout status deployment/streamlit-deployment --timeout=300s
          echo "RayService status:"
          kubectl -n dogbooth get rayservice dogbooth -o wide || true

      - name: Deployment summary
        if: always()
        run: |
          {
            echo "### JARK stack deployment"
            echo ""
            echo "| App | Image |"
            echo "| --- | ----- |"
            echo "| Streamlit UI | \`${{ steps.img.outputs.app_image || 'manifest default' }}\` |"
            echo "| Ray Serve (dogbooth) | \`${{ steps.img.outputs.service_image || 'manifest default' }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
