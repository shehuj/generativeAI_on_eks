name: CD

# Reusable continuous-deployment pipeline — deploys the JARK stack apps to the
# EKS cluster:
#   - src/service/ray-service.yaml  -> RayService "dogbooth" (model serving)
#   - src/app/streamlit.yaml        -> Streamlit UI + Service + Ingress
#
# Configuration is read from GitHub Actions secrets. Required: AWS_ROLE_ARN,
# EKS_CLUSTER_NAME. Optional: AWS_REGION (defaults us-east-1), DOCKERHUB_USERNAME.
#
# Called by deploy.yml only after BOTH infra and ci succeed. Can also be run
# manually via workflow_dispatch to roll out a specific image tag.

on:
  workflow_call:
    inputs:
      image_tag:
        description: "Image tag to deploy (defaults to the commit SHA)"
        type: string
        required: false
        default: ""
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy"
        type: string
        default: latest

permissions:
  contents: read
  id-token: write # required for AWS OIDC role assumption

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

env:
  TF_DIR: ai-ml/jark-stack/terraform

jobs:
  deploy:
    name: Deploy apps to EKS
    runs-on: ubuntu-latest
    environment: production # add reviewers in Settings -> Environments for an approval gate
    steps:
      - uses: actions/checkout@v4

      - name: Load config from GitHub secrets
        env:
          AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          [ -z "$AWS_ROLE_ARN" ]     && { echo "::error::secrets.AWS_ROLE_ARN is required"; exit 1; }
          [ -z "$EKS_CLUSTER_NAME" ] && { echo "::error::secrets.EKS_CLUSTER_NAME is required"; exit 1; }
          for v in AWS_REGION EKS_CLUSTER_NAME DOCKERHUB_USERNAME; do
            val="${!v}"; [ -n "$val" ] && echo "$v=$val" >> "$GITHUB_ENV"
          done
          grep -q '^AWS_REGION=' "$GITHUB_ENV" || echo "AWS_REGION=us-east-1" >> "$GITHUB_ENV"
          echo "Deploying to cluster '${EKS_CLUSTER_NAME}'"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name "$EKS_CLUSTER_NAME" --region "$AWS_REGION"

      - name: Resolve image overrides
        id: img
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          TAG="${{ inputs.image_tag != '' && inputs.image_tag || github.sha }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          # Only use the Docker Hub images when BOTH creds exist — that's the same
          # condition under which CI actually pushes them. Otherwise fall back to
          # the upstream public images in the manifests (avoids deploying a tag
          # that was never pushed).
          if [ -n "${DOCKERHUB_USERNAME:-}" ] && [ -n "${DOCKERHUB_TOKEN:-}" ]; then
            echo "use_dockerhub=true" >> "$GITHUB_OUTPUT"
            echo "app_image=docker.io/${DOCKERHUB_USERNAME}/dogbooth-app:${TAG}" >> "$GITHUB_OUTPUT"
            echo "service_image=docker.io/${DOCKERHUB_USERNAME}/dogbooth:${TAG}" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::DOCKERHUB_USERNAME/DOCKERHUB_TOKEN not both set — CI does not push images; deploying the upstream public images from the manifests."
            echo "use_dockerhub=false" >> "$GITHUB_OUTPUT"
            echo "app_image="     >> "$GITHUB_OUTPUT"
            echo "service_image=" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure Docker Hub pull secret (private images)
        if: steps.img.outputs.use_dockerhub == 'true'
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail
          for ns in dogbooth dogbooth-app; do
            kubectl create namespace "$ns" --dry-run=client -o yaml | kubectl apply -f -
            kubectl -n "$ns" create secret docker-registry dockerhub \
              --docker-server=https://index.docker.io/v1/ \
              --docker-username="$DOCKERHUB_USERNAME" \
              --docker-password="$DOCKERHUB_TOKEN" \
              --dry-run=client -o yaml | kubectl apply -f -
            kubectl -n "$ns" patch serviceaccount default \
              -p '{"imagePullSecrets":[{"name":"dockerhub"}]}'
          done

      - name: Deploy Ray Serve model (dogbooth)
        working-directory: ${{ env.TF_DIR }}
        run: |
          set -euo pipefail
          manifest=src/service/ray-service.yaml
          if [ -n "${{ steps.img.outputs.service_image }}" ]; then
            sed -i "s#image: public.ecr.aws/[^[:space:]]*/\?dogbooth:[^[:space:]]*#image: ${{ steps.img.outputs.service_image }}#g" "$manifest"
          fi
          kubectl apply -f "$manifest"

      - name: Deploy Streamlit app
        working-directory: ${{ env.TF_DIR }}
        run: |
          set -euo pipefail
          manifest=src/app/streamlit.yaml
          if [ -n "${{ steps.img.outputs.app_image }}" ]; then
            sed -i "s#image: public.ecr.aws/[^[:space:]]*/\?dogbooth-app:[^[:space:]]*#image: ${{ steps.img.outputs.app_image }}#g" "$manifest"
          fi
          kubectl apply -f "$manifest"

      - name: Wait for rollout
        run: |
          set -uo pipefail
          if ! kubectl -n dogbooth-app rollout status deployment/streamlit-deployment --timeout=600s; then
            echo "::warning::Streamlit rollout did not complete — dumping diagnostics"
            kubectl -n dogbooth-app get pods -o wide || true
            kubectl -n dogbooth-app describe deployment/streamlit-deployment 2>&1 | tail -30 || true
            kubectl -n dogbooth-app get events --sort-by=.lastTimestamp 2>&1 | tail -30 || true
            exit 1
          fi
          echo "RayService status (GPU-backed; may stay pending until Karpenter scales a g5 node):"
          kubectl -n dogbooth get rayservice dogbooth -o wide || true

      - name: Deployment summary
        if: always()
        run: |
          {
            echo "### JARK stack deployment"
            echo ""
            echo "| App | Image |"
            echo "| --- | ----- |"
            echo "| Streamlit UI | \`${{ steps.img.outputs.app_image || 'manifest default' }}\` |"
            echo "| Ray Serve (dogbooth) | \`${{ steps.img.outputs.service_image || 'manifest default' }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
