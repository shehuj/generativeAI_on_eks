# Installs Python deps, lints, and runs the JARK stack unit tests across
# several Python versions.
# Docs: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python tests

on:
  push:
    branches: ["main"]
    paths:
      - "ai-ml/jark-stack/**"
      - "tests/**"
      - "pytest.ini"
      - ".github/workflows/python-test.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "ai-ml/jark-stack/**"
      - "tests/**"
      - "pytest.ini"
      - ".github/workflows/python-test.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: python-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install flake8
          # Test deps only — the app's heavy runtime libs are stubbed in conftest.py
          if [ -f tests/requirements.txt ]; then pip install -r tests/requirements.txt; fi

      - name: Lint with flake8
        run: |
          # Fail the build on syntax errors or undefined names in app code + tests
          flake8 ai-ml/jark-stack/terraform/src tests --count \
            --select=E9,F63,F7,F82 --show-source --statistics
          # Style warnings (non-blocking)
          flake8 ai-ml/jark-stack/terraform/src tests --count \
            --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run tests
        run: pytest
