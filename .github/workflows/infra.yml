name: Infra

# Reusable infrastructure pipeline — provisions the JARK stack EKS platform
# with Terraform (ai-ml/jark-stack/terraform).
#
# Configuration is read from GitHub Actions secrets. Required: AWS_ROLE_ARN.
# Optional: AWS_REGION (defaults us-west-2), HUGGINGFACE_TOKEN, TF_STATE_BUCKET,
# TF_STATE_KEY, TF_STATE_REGION, TF_LOCK_TABLE.

on:
  workflow_call:
    inputs:
      action:
        description: "plan | apply"
        type: string
        required: false
        default: plan
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action to run"
        type: choice
        options: [plan, apply, destroy]
        default: plan
  pull_request:
    paths:
      - "ai-ml/jark-stack/terraform/**"
      - ".github/workflows/infra.yml"

permissions:
  contents: read
  id-token: write # required for AWS OIDC role assumption

concurrency:
  group: infra-${{ github.ref }}
  cancel-in-progress: false # never cancel an in-flight apply

env:
  TF_DIR: ai-ml/jark-stack/terraform
  TF_VERSION: "1.9.8"

jobs:
  terraform:
    name: Terraform ${{ inputs.action || 'plan' }}
    runs-on: ubuntu-latest
    # An "apply"/"destroy" runs against a protected environment so you can add a
    # manual approval gate in repo settings (Settings -> Environments -> production).
    environment: ${{ (inputs.action == 'apply' || inputs.action == 'destroy') && 'production' || '' }}
    steps:
      - uses: actions/checkout@v4

      # Map secrets into the job env so later steps can use shell vars and `if:`
      # conditions (secrets can't be referenced directly in `if:`). AWS_REGION
      # falls back to us-west-2 when the secret is not set.
      - name: Load config from GitHub secrets
        env:
          AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          HUGGINGFACE_TOKEN: ${{ secrets.HUGGINGFACE_TOKEN }}
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
          TF_STATE_KEY: ${{ secrets.TF_STATE_KEY }}
          TF_STATE_REGION: ${{ secrets.TF_STATE_REGION }}
          TF_LOCK_TABLE: ${{ secrets.TF_LOCK_TABLE }}
        run: |
          [ -z "$AWS_ROLE_ARN" ] && { echo "::error::secrets.AWS_ROLE_ARN is required"; exit 1; }
          for v in AWS_REGION HUGGINGFACE_TOKEN TF_STATE_BUCKET TF_STATE_KEY TF_STATE_REGION TF_LOCK_TABLE; do
            val="${!v}"; [ -n "$val" ] && echo "$v=$val" >> "$GITHUB_ENV"
          done
          grep -q '^AWS_REGION=' "$GITHUB_ENV" || echo "AWS_REGION=us-west-2" >> "$GITHUB_ENV"
          echo "Config loaded from GitHub secrets"

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: terraform fmt -check
        working-directory: ${{ env.TF_DIR }}
        run: terraform fmt -check

      - name: Configure S3 backend (when TF_STATE_BUCKET is set)
        if: env.TF_STATE_BUCKET != ''
        working-directory: ${{ env.TF_DIR }}
        run: |
          cat > backend_ci_override.tf <<'EOF'
          terraform {
            backend "s3" {}
          }
          EOF

      - name: Terraform init
        working-directory: ${{ env.TF_DIR }}
        run: |
          if [ -n "${TF_STATE_BUCKET:-}" ]; then
            terraform init -input=false -upgrade \
              -backend-config="bucket=${TF_STATE_BUCKET}" \
              -backend-config="key=${TF_STATE_KEY:-jark-stack/terraform.tfstate}" \
              -backend-config="region=${TF_STATE_REGION:-$AWS_REGION}" \
              ${TF_LOCK_TABLE:+-backend-config=dynamodb_table=$TF_LOCK_TABLE}
          else
            echo "::warning::No TF_STATE_BUCKET secret — using ephemeral local state (fine for plan, NOT for apply)."
            terraform init -input=false -upgrade
          fi

      - name: Terraform validate
        working-directory: ${{ env.TF_DIR }}
        run: terraform validate

      - name: Terraform plan
        if: inputs.action != 'destroy'
        working-directory: ${{ env.TF_DIR }}
        env:
          TF_VAR_huggingface_token: ${{ env.HUGGINGFACE_TOKEN }}
          TF_VAR_region: ${{ env.AWS_REGION }}
        run: terraform plan -input=false -out=tfplan

      - name: Terraform apply
        if: inputs.action == 'apply' && github.ref == 'refs/heads/main'
        working-directory: ${{ env.TF_DIR }}
        env:
          TF_VAR_huggingface_token: ${{ env.HUGGINGFACE_TOKEN }}
          TF_VAR_region: ${{ env.AWS_REGION }}
        run: terraform apply -input=false -auto-approve tfplan

      - name: Terraform destroy
        if: inputs.action == 'destroy'
        working-directory: ${{ env.TF_DIR }}
        env:
          TF_VAR_huggingface_token: ${{ env.HUGGINGFACE_TOKEN }}
          TF_VAR_region: ${{ env.AWS_REGION }}
        run: terraform destroy -input=false -auto-approve
