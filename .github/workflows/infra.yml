name: Infra

# Reusable infrastructure pipeline — provisions the JARK stack EKS platform
# with Terraform (ai-ml/jark-stack/terraform).
#
# Configuration is read from a single AWS Secrets Manager secret (JSON) at
# runtime — see .github/workflows/README.md. The only GitHub-side config needed
# is the OIDC role (secrets.AWS_ROLE_ARN); the bootstrap region defaults to
# us-west-2 and can be overridden with vars.AWS_REGION.

on:
  workflow_call:
    inputs:
      action:
        description: "plan | apply"
        type: string
        required: false
        default: plan
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action to run"
        type: choice
        options: [plan, apply, destroy]
        default: plan
  pull_request:
    paths:
      - "ai-ml/jark-stack/terraform/**"
      - ".github/workflows/infra.yml"
      - ".github/actions/aws-config/**"

permissions:
  contents: read
  id-token: write # required for AWS OIDC role assumption

concurrency:
  group: infra-${{ github.ref }}
  cancel-in-progress: false # never cancel an in-flight apply

env:
  TF_DIR: ai-ml/jark-stack/terraform
  TF_VERSION: "1.9.8"
  # Bootstrap region used to assume the role and read Secrets Manager. The secret
  # may carry its own AWS_REGION which then takes over for Terraform/EKS.
  AWS_REGION: ${{ vars.AWS_REGION || 'us-west-2' }}

jobs:
  terraform:
    name: Terraform ${{ inputs.action || 'plan' }}
    runs-on: ubuntu-latest
    # An "apply"/"destroy" runs against a protected environment so you can add a
    # manual approval gate in repo settings (Settings -> Environments -> production).
    environment: ${{ (inputs.action == 'apply' || inputs.action == 'destroy') && 'production' || '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Preflight — OIDC role present
        env:
          AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
        run: |
          [ -z "$AWS_ROLE_ARN" ] && { echo "::error::secrets.AWS_ROLE_ARN is required"; exit 1; }
          echo "Preflight OK (region: ${AWS_REGION})"

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # Assume the role and load HUGGINGFACE_TOKEN, TF_STATE_*, EKS_CLUSTER_NAME,
      # AWS_REGION, etc. from Secrets Manager into the job environment.
      - name: AWS auth + load config
        uses: ./.github/actions/aws-config
        with:
          role-arn: ${{ secrets.AWS_ROLE_ARN }}
          region: ${{ env.AWS_REGION }}
          secret-id: ${{ vars.CONFIG_SECRET_ID || 'jark-stack/config' }}

      - name: terraform fmt -check
        working-directory: ${{ env.TF_DIR }}
        run: terraform fmt -check

      - name: Configure S3 backend (when TF_STATE_BUCKET is set)
        if: env.TF_STATE_BUCKET != ''
        working-directory: ${{ env.TF_DIR }}
        run: |
          cat > backend_ci_override.tf <<'EOF'
          terraform {
            backend "s3" {}
          }
          EOF

      - name: Terraform init
        working-directory: ${{ env.TF_DIR }}
        run: |
          if [ -n "${TF_STATE_BUCKET:-}" ]; then
            terraform init -input=false -upgrade \
              -backend-config="bucket=${TF_STATE_BUCKET}" \
              -backend-config="key=${TF_STATE_KEY:-jark-stack/terraform.tfstate}" \
              -backend-config="region=${TF_STATE_REGION:-$AWS_REGION}" \
              ${TF_LOCK_TABLE:+-backend-config=dynamodb_table=$TF_LOCK_TABLE}
          else
            echo "::warning::No TF_STATE_BUCKET in the config secret — using ephemeral local state (fine for plan, NOT for apply)."
            terraform init -input=false -upgrade
          fi

      - name: Terraform validate
        working-directory: ${{ env.TF_DIR }}
        run: terraform validate

      - name: Terraform plan
        if: inputs.action != 'destroy'
        working-directory: ${{ env.TF_DIR }}
        env:
          TF_VAR_huggingface_token: ${{ env.HUGGINGFACE_TOKEN }}
          TF_VAR_region: ${{ env.AWS_REGION }}
        run: terraform plan -input=false -out=tfplan

      - name: Terraform apply
        if: inputs.action == 'apply' && github.ref == 'refs/heads/main'
        working-directory: ${{ env.TF_DIR }}
        env:
          TF_VAR_huggingface_token: ${{ env.HUGGINGFACE_TOKEN }}
          TF_VAR_region: ${{ env.AWS_REGION }}
        run: terraform apply -input=false -auto-approve tfplan

      - name: Terraform destroy
        if: inputs.action == 'destroy'
        working-directory: ${{ env.TF_DIR }}
        env:
          TF_VAR_huggingface_token: ${{ env.HUGGINGFACE_TOKEN }}
          TF_VAR_region: ${{ env.AWS_REGION }}
        run: terraform destroy -input=false -auto-approve
