name: CI

# Reusable CI pipeline for the JARK stack apps.
# - Lints & tests Python
# - Checks Terraform formatting & validity
# - Builds the app/service container images (and pushes to Docker Hub when configured)
#
# Runs standalone on pull requests, and is called by deploy.yml as part of the
# orchestrated infra+ci -> cd pipeline.

on:
  workflow_call:
    inputs:
      image_tag:
        description: "Tag to apply to built images (defaults to the commit SHA)"
        type: string
        required: false
        default: ""
    outputs:
      image_tag:
        description: "The tag applied to the built images"
        value: ${{ jobs.build-images.outputs.image_tag }}
  pull_request:
    paths:
      - "ai-ml/jark-stack/**"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

permissions:
  contents: read # CI authenticates to Docker Hub with username/token, no OIDC needed

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TF_DIR: ai-ml/jark-stack/terraform
  TF_VERSION: "1.9.8"

jobs:
  lint-test:
    name: Python lint & test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          # Test deps only — app runtime libs are stubbed in tests/conftest.py
          if [ -f tests/requirements.txt ]; then pip install -r tests/requirements.txt; fi

      - name: Lint (fail on syntax errors / undefined names)
        run: |
          flake8 ai-ml/jark-stack/terraform/src tests --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 ai-ml/jark-stack/terraform/src tests --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Test (pytest)
        run: pytest

  terraform-validate:
    name: Terraform fmt & validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: terraform fmt -check
        working-directory: ${{ env.TF_DIR }}
        run: terraform fmt -check

      - name: terraform init (no backend)
        working-directory: ${{ env.TF_DIR }}
        run: terraform init -backend=false -input=false

      - name: terraform validate
        working-directory: ${{ env.TF_DIR }}
        run: terraform validate

  build-images:
    name: Build image (${{ matrix.image.name }})
    runs-on: ubuntu-latest
    needs: [lint-test, terraform-validate]
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: dogbooth-app
            context: ai-ml/jark-stack/terraform/src/app
            heavy: "false"
          - name: dogbooth
            context: ai-ml/jark-stack/terraform/src/service
            heavy: "true" # GPU ray-ml base image is large
    steps:
      - uses: actions/checkout@v4

      - name: Free up disk space (large GPU image)
        if: matrix.image.heavy == 'true'
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force || true
          df -h

      - name: Compute image tag
        id: meta
        run: echo "tag=${{ inputs.image_tag != '' && inputs.image_tag || github.sha }}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: vars.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build (and push when DOCKERHUB_USERNAME is set)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          push: ${{ vars.DOCKERHUB_USERNAME != '' }}
          tags: >-
            ${{ vars.DOCKERHUB_USERNAME != ''
              && format('docker.io/{0}/{1}:{2}', vars.DOCKERHUB_USERNAME, matrix.image.name, steps.meta.outputs.tag)
              || format('{0}:{1}', matrix.image.name, steps.meta.outputs.tag) }}
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}
