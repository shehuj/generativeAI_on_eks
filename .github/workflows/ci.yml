name: CI

# Reusable CI pipeline for the JARK stack apps.
# - Lints & tests Python
# - Checks Terraform formatting & validity
# - Builds the app/service container images (and pushes to Docker Hub when configured)
#
# Runs standalone on pull requests, and is called by deploy.yml as part of the
# orchestrated infra+ci -> cd pipeline.

on:
  workflow_call:
    inputs:
      image_tag:
        description: "Tag to apply to built images (defaults to the commit SHA)"
        type: string
        required: false
        default: ""
    outputs:
      image_tag:
        description: "The tag applied to the built images"
        value: ${{ jobs.build-images.outputs.image_tag }}
  pull_request:
    paths:
      - "ai-ml/jark-stack/**"
      - ".github/workflows/ci.yml"
      - ".github/actions/aws-config/**"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # OIDC: build-images reads Docker Hub creds from AWS Secrets Manager

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TF_DIR: ai-ml/jark-stack/terraform
  TF_VERSION: "1.9.8"

jobs:
  lint-test:
    name: Python lint & test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          # Test deps only — app runtime libs are stubbed in tests/conftest.py
          if [ -f tests/requirements.txt ]; then pip install -r tests/requirements.txt; fi

      - name: Lint (fail on syntax errors / undefined names)
        run: |
          flake8 ai-ml/jark-stack/terraform/src tests --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 ai-ml/jark-stack/terraform/src tests --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Test (pytest)
        run: pytest tests/

  terraform-validate:
    name: Terraform fmt & validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: terraform fmt -check
        working-directory: ${{ env.TF_DIR }}
        run: terraform fmt -check

      - name: terraform init (no backend)
        working-directory: ${{ env.TF_DIR }}
        run: terraform init -backend=false -input=false

      - name: terraform validate
        working-directory: ${{ env.TF_DIR }}
        run: terraform validate

  build-images:
    name: Build image (${{ matrix.image.name }})
    runs-on: ubuntu-latest
    needs: [lint-test, terraform-validate]
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: dogbooth-app
            context: ai-ml/jark-stack/terraform/src/app
            heavy: "false"
          - name: dogbooth
            context: ai-ml/jark-stack/terraform/src/service
            heavy: "true" # GPU ray-ml base image is large
    steps:
      - uses: actions/checkout@v4

      - name: Free up disk space (large GPU image)
        if: matrix.image.heavy == 'true'
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force || true
          df -h

      - name: Compute image tag
        id: meta
        run: echo "tag=${{ inputs.image_tag != '' && inputs.image_tag || github.sha }}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      # Docker Hub creds come from AWS Secrets Manager. Push is best-effort: if no
      # OIDC role is configured (e.g. fork PRs) or the secret can't be read, the
      # image is built to cache only and the job still succeeds.
      - name: Detect AWS availability
        id: pre
        env:
          AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
        run: |
          if [ -n "$AWS_ROLE_ARN" ]; then echo "aws=true" >> "$GITHUB_OUTPUT"; else echo "aws=false" >> "$GITHUB_OUTPUT"; fi

      - name: AWS auth + load Docker Hub creds
        if: steps.pre.outputs.aws == 'true'
        continue-on-error: true
        uses: ./.github/actions/aws-config
        with:
          role-arn: ${{ secrets.AWS_ROLE_ARN }}
          region: ${{ vars.AWS_REGION || 'us-west-2' }}
          secret-id: ${{ vars.CONFIG_SECRET_ID || 'jark-stack/config' }}

      - name: Login to Docker Hub
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Build (and push when Docker Hub creds are present)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          push: ${{ env.DOCKERHUB_USERNAME != '' }}
          tags: >-
            ${{ env.DOCKERHUB_USERNAME != ''
              && format('docker.io/{0}/{1}:{2}', env.DOCKERHUB_USERNAME, matrix.image.name, steps.meta.outputs.tag)
              || format('{0}:{1}', matrix.image.name, steps.meta.outputs.tag) }}
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}
